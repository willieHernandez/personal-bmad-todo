services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - DB_PATH=/data/data.db
    volumes:
      - todo-data:/data
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "${CLIENT_PORT:-8080}:8080"
    networks:
      - todo-network
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  todo-network:
    driver: bridge

volumes:
  todo-data:
    driver: local
