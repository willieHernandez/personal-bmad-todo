# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions: []

# Add persistent memories for the agent
memories:
  - "Playwright MCP is available for browser-based testing. Use it during after all tasks have been completed in dev-story workflow to visually verify UI changes by navigating to localhost:5173 and taking screenshots."
  - "When reviewing frontend stories, use Playwright MCP tools (browser_navigate, browser_snapshot, browser_take_screenshot) to verify the UI matches acceptance criteria before approving."
  - "Git workflow: At the START of every story, create a feature branch named story/{story-key} from main (e.g., git checkout main && git pull && git checkout -b story/1-4-tree-view-and-hierarchy-creation). All commits go on this branch."
  - "Git workflow: After code review passes and story is marked done, create a pull request from the feature branch to main using gh pr create. Include the story key and summary in the PR description."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
