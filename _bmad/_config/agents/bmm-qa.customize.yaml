# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions: []

# Add persistent memories for the agent
memories:
  - "Playwright MCP is available for E2E acceptance criteria verification. Use browser_navigate, browser_snapshot, and browser_take_screenshot to verify UI behavior at localhost:5173."
  - "Postman MCP is available for API integration testing. Use it to validate endpoint contracts, test request/response shapes against shared Zod schemas, and verify error handling (400, 404, 500 responses)."
  - "Chrome DevTools MCP is available for debugging during test development — use for console inspection, network request analysis, and DOM validation."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
